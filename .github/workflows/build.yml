name: Build and Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag"
        required: true
      build:
        description: "Build date"
        required: true

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v6.4.0
        with:
          go-version: "1.26.4"

      - name: Create dist
        run: mkdir -p dist

      - name: Build Linux binaries
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 \
            go build -trimpath -ldflags="-s -w" \
            -o dist/tutuck-server-linux-amd64 .

          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 \
            go build -trimpath -ldflags="-s -w" \
            -o dist/tutuck-server-linux-arm64 .

      - name: Build macOS binaries
        run: |
          CGO_ENABLED=0 GOOS=darwin GOARCH=amd64 \
            go build -trimpath -ldflags="-s -w" \
            -o dist/tutuck-server-macos-amd64 .

          CGO_ENABLED=0 GOOS=darwin GOARCH=arm64 \
            go build -trimpath -ldflags="-s -w" \
            -o dist/tutuck-server-macos-arm64 .

      - name: Build Windows binaries
        run: |
          CGO_ENABLED=0 GOOS=windows GOARCH=amd64 \
            go build -trimpath -ldflags="-s -w" \
            -o dist/tutuck-server-windows-amd64.exe .

          CGO_ENABLED=0 GOOS=windows GOARCH=arm64 \
            go build -trimpath -ldflags="-s -w" \
            -o dist/tutuck-server-windows-arm64.exe .

      - name: Create tag
        run: |
          git tag ${{ github.event.inputs.version }}
          git push origin ${{ github.event.inputs.version }}

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version }}
          name: "TuTuck ${{ github.event.inputs.version }} | Build: ${{ github.event.inputs.build }}"
          generate_release_notes: true
          body: |
            # TuTuck Server prebuilt binaries
          files: |
            dist/tutuck-server-linux-amd64
            dist/tutuck-server-linux-arm64
            dist/tutuck-server-macos-amd64
            dist/tutuck-server-macos-arm64
            dist/tutuck-server-windows-amd64.exe
            dist/tutuck-server-windows-arm64.exe
          draft: false
          prerelease: false
